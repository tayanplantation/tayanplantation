<div id="app-root"></div>
<style>
  #app-root {
    --bg: #F5F6F8;
    --panel: #FFFFFF;
    --ink: #1A1D1F;
    --ink-soft: #6F7780;
    --ink-faint: #9BA3AC;
    --line: #EAECEF;
    --primary: #1F4B3F;
    --primary-soft: #E8F0EC;
    --success: #1E8E5A;
    --success-bg: #E7F6EE;
    --danger: #C23B3B;
    --danger-bg: #FBEAEA;
    --shadow: 0 1px 2px rgba(16,24,32,0.04), 0 2px 8px rgba(16,24,32,0.04);
    font-family: "Inter", -apple-system, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    display: block;
  }
  #app-root * { box-sizing: border-box; }
  #app-root h1, #app-root h2, #app-root h3 { margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  #app-root button { font-family: inherit; cursor: pointer; }
  #app-root select, #app-root input { font-family: inherit; }

  .erp-shell { display: flex; min-height: 100vh; }

  /* Sidebar */
  .erp-sidebar { width: 220px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--line); padding: 20px 14px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .erp-brand { display: flex; align-items: center; gap: 9px; padding: 4px 8px 22px; }
  .erp-brand .dot { width: 10px; height: 10px; border-radius: 3px; background: var(--primary); flex-shrink: 0; }
  .erp-brand span { font-size: 14.5px; font-weight: 700; letter-spacing: -0.01em; }
  .erp-nav { display: flex; flex-direction: column; gap: 2px; }
  .erp-nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; border: none; background: none; color: var(--ink-soft); font-size: 13.5px; font-weight: 500; text-align: left; width: 100%; }
  .erp-nav-item svg { flex-shrink: 0; opacity: 0.85; }
  .erp-nav-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
  .erp-nav-item:not(.active):hover { background: #F7F7F8; }
  .erp-nav-sep { height: 1px; background: var(--line); margin: 12px 4px; }

  /* Mobile sidebar */
  .erp-sidebar-backdrop { display: none; }
  @media (max-width: 860px) {
    .erp-sidebar { position: fixed; z-index: 40; left: 0; top: 0; transform: translateX(-100%); transition: transform 0.2s ease; box-shadow: var(--shadow); }
    .erp-sidebar.open { transform: translateX(0); }
    .erp-sidebar-backdrop.open { display: block; position: fixed; inset: 0; background: rgba(20,22,17,0.35); z-index: 39; }
  }

  .erp-main { flex: 1; min-width: 0; padding: 22px 26px 60px; }
  @media (max-width: 860px) { .erp-main { padding: 16px 16px 50px; } }
  @media (max-width: 480px) { .erp-main { padding: 14px 12px 50px; } }

  /* Header */
  .erp-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .erp-header h1 { font-size: 21px; }
  .erp-header .sub { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
  .erp-header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .erp-menu-btn { display: none; }
  @media (max-width: 860px) { .erp-menu-btn { display: flex; } }

  .erp-select { height: 36px; border-radius: 9px; border: 1px solid var(--line); background: var(--panel); padding: 0 10px; font-size: 13px; color: var(--ink); font-weight: 500; }
  .erp-icon-btn { height: 36px; width: 36px; display: flex; align-items: center; justify-content: center; border-radius: 9px; border: 1px solid var(--line); background: var(--panel); color: var(--ink-soft); }
  .erp-icon-btn:hover { background: #F7F7F8; }
  .erp-btn-outline { height: 36px; display: flex; align-items: center; gap: 6px; padding: 0 13px; border-radius: 9px; border: 1px solid var(--line); background: var(--panel); font-size: 13px; font-weight: 600; color: var(--ink); }
  .erp-btn-outline:hover { background: #F7F7F8; }

  /* Section title */
  .erp-section-title { font-size: 14px; font-weight: 700; color: var(--ink); margin: 26px 0 12px; }
  .erp-section-title:first-child { margin-top: 0; }

  /* Section 1: summary cards */
  .erp-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 720px) { .erp-grid-3 { grid-template-columns: 1fr; } }
  .erp-card { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); }
  .erp-summary-card .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .erp-summary-card .icon-wrap { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .erp-summary-card .label { font-size: 13px; color: var(--ink-soft); font-weight: 600; }
  .erp-summary-card .value { font-size: 24px; font-weight: 700; letter-spacing: -0.01em; }
  .erp-summary-card .badge { font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }

  /* Section 2: 4 horizontal cards */
  .erp-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 860px) { .erp-grid-4 { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .erp-grid-4 { grid-template-columns: 1fr; } }
  .erp-stat-card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 12px; }
  .erp-stat-card .icon-wrap { width: 34px; height: 34px; border-radius: 9px; background: #F5F6F8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .erp-stat-card .label { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
  .erp-stat-card .value { font-size: 16.5px; font-weight: 700; margin-top: 2px; }

  /* Section 3: ranking */
  .erp-rank-row { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--line); }
  .erp-rank-row:last-child { border-bottom: none; }
  .erp-rank-medal { font-size: 17px; width: 26px; text-align: center; flex-shrink: 0; }
  .erp-rank-body { flex: 1; min-width: 0; }
  .erp-rank-name { font-size: 13.5px; font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .erp-rank-bar-track { height: 7px; border-radius: 4px; background: #F0F1F3; overflow: hidden; }
  .erp-rank-bar-fill { height: 100%; border-radius: 4px; background: var(--primary); }
  .erp-rank-amt { font-size: 13.5px; font-weight: 700; white-space: nowrap; flex-shrink: 0; padding-left: 8px; }

  /* Section 4: table */
  .erp-table { width: 100%; border-collapse: collapse; }
  .erp-table th { text-align: left; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faint); font-weight: 700; padding: 0 4px 10px; border-bottom: 1px solid var(--line); }
  .erp-table th.num, .erp-table td.num { text-align: right; }
  .erp-table td { font-size: 13.5px; padding: 11px 4px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .erp-table tr:last-child td { border-bottom: none; }
  .erp-table .acc-name { font-weight: 600; }
  .erp-table .pct-track { display: inline-block; width: 54px; height: 5px; border-radius: 3px; background: #F0F1F3; margin-right: 8px; vertical-align: middle; overflow: hidden; }
  .erp-table .pct-fill { height: 100%; background: var(--primary); }

  /* Section 5: recent transactions */
  .erp-tx-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .erp-tx-row:last-child { border-bottom: none; }
  .erp-tx-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .erp-tx-date { font-size: 11.5px; font-weight: 700; color: var(--primary); background: var(--primary-soft); border-radius: 6px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0; }
  .erp-tx-info { min-width: 0; }
  .erp-tx-ket { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 360px; }
  .erp-tx-meta { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
  .erp-tx-amt { font-size: 13.5px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .amt-in { color: var(--success); }
  .amt-out { color: var(--danger); }

  .erp-empty { text-align: center; color: var(--ink-faint); font-size: 13.5px; padding: 30px 0; }
  .erp-toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); background: var(--primary); color: white; font-size: 13.5px; font-weight: 600; padding: 11px 18px; border-radius: 999px; z-index: 60; box-shadow: var(--shadow); }

  /* Import modal (tetap dipakai, gaya disamakan) */
  .kk-overlay { position: fixed; inset: 0; background: rgba(20,22,17,0.45); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .kk-modal { background: var(--panel); width: 100%; max-width: 460px; border-radius: 18px; padding: 22px 22px 20px; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow); }
  .kk-modal h2 { font-size: 17px; margin-bottom: 14px; }
  .kk-warn { background: var(--danger-bg); color: var(--danger); border-radius: 10px; padding: 11px 13px; font-size: 13px; margin-bottom: 14px; font-weight: 600; }
  .kk-modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .kk-modal-actions button { flex: 1; height: 44px; border-radius: 10px; font-size: 14px; font-weight: 700; border: none; }
  .kk-cancel { background: #F0F1F3; color: var(--ink); }
  .kk-save { background: var(--primary); color: white; }
  .kk-save:disabled { opacity: 0.5; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

  const root = document.getElementById("app-root");

  function fmt(n) {
    const s = Math.abs(Math.round(n)).toLocaleString("id-ID");
    return (n < 0 ? "-Rp" : "Rp") + s;
  }
  function todayStr() {
    const d = new Date();
    return d.toLocaleDateString("id-ID", { day: "2-digit", month: "long", year: "numeric" });
  }

  // ===== AUTO-FETCH DATA DARI GITHUB (tidak perlu impor manual lagi) =====
  // Ganti nilai ini kalau nama repo/branch berubah.
  const GITHUB_OWNER = "tayanplantation";
  const GITHUB_REPO = "tayanplantation";
  const GITHUB_BRANCH = "main";
  const FILE_KAS_KECIL = "data-kas-kecil.xlsx";
  const FILE_PENGIRIMAN = "data-pengiriman.xlsx";

  function githubRawUrl(filename) {
    return `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${filename}?t=${Date.now()}`;
  }

  function parseKasKecilWorkbook(wb) {
    const out = { kebun: [], dapur: [], saldoKebun: null, saldoDapur: null };
    for (const sheetName of wb.SheetNames) {
      const kas = detectKas(sheetName);
      if (!kas) continue;
      const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, raw: true, defval: null });
      const blocks = parseSheetBlocks(aoa);
      const tx = toTx(kas, blocks);
      out[kas] = out[kas].concat(tx);
      if (tx.length) out[kas === "kebun" ? "saldoKebun" : "saldoDapur"] = tx[tx.length - 1].saldoFromFile;
    }
    return out;
  }

  async function fetchWorkbook(filename) {
    const res = await fetch(githubRawUrl(filename), { cache: "no-store" });
    if (!res.ok) throw new Error(res.status === 404 ? "File belum ada di GitHub" : "HTTP " + res.status);
    const buf = await res.arrayBuffer();
    return XLSX.read(buf, { type: "array" });
  }

  async function autoFetchFromGithub(silent) {
    if (typeof XLSX === "undefined") return;
    ui.fetchStatus = "loading";
    if (!silent) render();
    let anySuccess = false;
    try {
      const wb = await fetchWorkbook(FILE_KAS_KECIL);
      const parsed = parseKasKecilWorkbook(wb);
      if (parsed.kebun.length) { state.kebun.tx = parsed.kebun; if (parsed.saldoKebun !== null) state.kebun.saldo = parsed.saldoKebun; }
      if (parsed.dapur.length) { state.dapur.tx = parsed.dapur; if (parsed.saldoDapur !== null) state.dapur.saldo = parsed.saldoDapur; }
      anySuccess = true;
    } catch (e) { console.log("Belum bisa ambil " + FILE_KAS_KECIL + ":", e.message); }

    try {
      const wb2 = await fetchWorkbook(FILE_PENGIRIMAN);
      const shipments = parseShipmentWorkbook(wb2);
      if (shipments.length) { state.shipments = shipments; anySuccess = true; }
    } catch (e) { console.log("Belum bisa ambil " + FILE_PENGIRIMAN + ":", e.message); }

    if (anySuccess) {
      saveState();
      ui.lastUpdated = new Date();
      ui.fetchStatus = "ok";
      if (!silent) {
        ui.toast = "Data terbaru berhasil dimuat";
        render();
        setTimeout(() => { ui.toast = ""; render(); }, 1800);
        return;
      }
    } else {
      ui.fetchStatus = "gagal";
    }
    render();
  }

  async function loadState() {
    try {
      const raw = localStorage.getItem("kas-state");
      if (raw) {
        const loaded = JSON.parse(raw);
        state = { ...state, ...loaded };
        if (!state.categories) state.categories = { kebun: [...DEFAULT_CATEGORIES.kebun], dapur: [...DEFAULT_CATEGORIES.dapur] };
        if (!state.shipments) state.shipments = [];
      }
    } catch (e) { /* belum ada data tersimpan, pakai default */ }
    render();
    autoFetchFromGithub(true); // ambil versi terbaru dari GitHub di belakang layar
    setInterval(() => autoFetchFromGithub(true), 5 * 60 * 1000); // auto-refresh tiap 5 menit
  }
  async function saveState() {
    try { localStorage.setItem("kas-state", JSON.stringify(state)); }
    catch (e) { console.error("Gagal menyimpan data", e); }
  }

  function getPeriods(tx) {
    const map = new Map();
    for (const t of tx) {
      const d = new Date(t.ts);
      const key = d.getUTCFullYear() + "-" + String(d.getUTCMonth() + 1).padStart(2, "0");
      const label = d.toLocaleDateString("id-ID", { month: "long", year: "numeric", timeZone: "UTC" });
      if (!map.has(key)) map.set(key, label);
    }
    return [...map.entries()].sort((a, b) => b[0].localeCompare(a[0])).map(([key, label]) => ({ key, label }));
  }

  function summaryCard(kind, opts) {
    // kind: 'kebun' | 'dapur' | 'total'
    const icons = {
      kebun: { icon: "🌴", bg: "var(--primary-soft)" },
      dapur: { icon: "🍽", bg: "var(--primary-soft)" },
      total: { icon: "💰", bg: "var(--primary-soft)" }
    };
    const ic = icons[kind];
    const bad = opts.saldo < 0;
    return `
    <div class="erp-card erp-summary-card">
      <div class="top-row">
        <div class="icon-wrap" style="background:${ic.bg}">${ic.icon}</div>

      </div>
      <div class="label">${opts.label}</div>
      <div class="value" style="color:${bad ? 'var(--danger)' : 'var(--ink)'}">${fmt(opts.saldo)}</div>
    </div>`;
  }

  // Hitung kas masuk, kas keluar, saldo awal & akhir untuk 1 kas pada periode terpilih
  function kasFlowForPeriod(kas, periodKey) {
    const tx = state[kas].tx;
    let running = state[kas].saldo - tx.reduce((s, t) => s + (t.jenis === "in" ? t.jumlah : -t.jumlah), 0);
    const sorted = [...tx].sort((a, b) => a.ts - b.ts);
    const withRunning = sorted.map(t => {
      running += t.jenis === "in" ? t.jumlah : -t.jumlah;
      return { ...t, kas, runningAfter: running };
    });
    const inPeriod = (t) => {
      if (periodKey === "semua") return true;
      const d = new Date(t.ts);
      return (d.getUTCFullYear() + "-" + String(d.getUTCMonth() + 1).padStart(2, "0")) === periodKey;
    };
    const filtered = withRunning.filter(inPeriod);
    if (filtered.length === 0) {
      return { awal: state[kas].saldo, akhir: state[kas].saldo, masuk: 0, keluar: 0, tx: [] };
    }
    const firstIdx = withRunning.indexOf(filtered[0]);
    const awal = firstIdx > 0 ? withRunning[firstIdx - 1].runningAfter : (filtered[0].runningAfter - (filtered[0].jenis === "in" ? filtered[0].jumlah : -filtered[0].jumlah));
    const akhir = filtered[filtered.length - 1].runningAfter;
    const masuk = filtered.filter(t => t.jenis === "in").reduce((s, t) => s + t.jumlah, 0);
    const keluar = filtered.filter(t => t.jenis === "out").reduce((s, t) => s + t.jumlah, 0);
    return { awal, akhir, masuk, keluar, tx: filtered };
  }

  function scopedFlow() {
    const kasList = ui.filterKas === "semua" ? ["kebun", "dapur"] : [ui.filterKas];
    const periods = getPeriods(kasList.flatMap(k => state[k].tx));
    const effPeriod = ui.filterPeriod === "auto" ? (periods[0] ? periods[0].key : "semua") : ui.filterPeriod;
    let awal = 0, akhir = 0, masuk = 0, keluar = 0, tx = [];
    for (const k of kasList) {
      const f = kasFlowForPeriod(k, effPeriod);
      awal += f.awal; akhir += f.akhir; masuk += f.masuk; keluar += f.keluar;
      tx = tx.concat(f.tx);
    }
    tx.sort((a, b) => b.ts - a.ts);
    return { awal, akhir, masuk, keluar, tx, periods, effPeriod };
  }

  function periodFilterHtml(periods, effPeriod) {
    if (!periods.length) return "";
    const opts = periods.map(p => `<option value="${p.key}" ${effPeriod === p.key ? "selected" : ""}>${p.label}</option>`).join("");
    return `<select class="erp-select" id="f-filter-period">${opts}<option value="semua" ${effPeriod === "semua" ? "selected" : ""}>Semua periode</option></select>`;
  }

  function topExpensesHtml(tx, n) {
    const map = new Map();
    for (const t of tx) {
      if (t.jenis !== "out") continue;
      map.set(t.kode, (map.get(t.kode) || 0) + t.jumlah);
    }
    const arr = [...map.entries()].sort((a, b) => b[1] - a[1]).slice(0, n);
    if (!arr.length) return `<div class="erp-empty">Belum ada data pengeluaran.</div>`;
    const max = arr[0][1];
    const medals = ["🥇", "🥈", "🥉"];
    return arr.map(([kode, val], i) => `
      <div class="erp-rank-row">
        <div class="erp-rank-medal">${medals[i] || (i + 1)}</div>
        <div class="erp-rank-body">
          <div class="erp-rank-name">${kode}</div>
          <div class="erp-rank-bar-track"><div class="erp-rank-bar-fill" style="width:${Math.round(val / max * 100)}%"></div></div>
        </div>
        <div class="erp-rank-amt">${fmt(val)}</div>
      </div>`).join("");
  }

  function accountBreakdownHtml(tx, limit) {
    const map = new Map();
    let total = 0;
    for (const t of tx) {
      if (t.jenis !== "out") continue;
      map.set(t.kode, (map.get(t.kode) || 0) + t.jumlah);
      total += t.jumlah;
    }
    function sortKey(kode) {
      const m = kode.match(/^(\d+(?:\.\d+)*)/);
      if (m) return "1_" + m[1];
      return "2_" + kode; // akun tanpa kode COA (mis. Lain-lain) di paling akhir
    }
    let arr = [...map.entries()].sort((a, b) => sortKey(a[0]).localeCompare(sortKey(b[0]), undefined, { numeric: true }));
    if (limit) arr = arr.slice(0, limit);
    if (!arr.length) return `<div class="erp-empty">Belum ada data.</div>`;
    const rows = arr.map(([kode, val]) => {
      const pct = total > 0 ? (val / total * 100) : 0;
      return `<tr>
        <td class="acc-name">${kode}</td>
        <td class="num">${fmt(val)}</td>
        <td class="num"><span class="pct-track"><span class="pct-fill" style="width:${Math.round(pct)}%"></span></span>${pct.toFixed(1)}%</td>
      </tr>`;
    }).join("");
    return `<table class="erp-table">
      <thead><tr><th>Nama Akun</th><th class="num">Nominal</th><th class="num">Persentase</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  // Kelompokkan transaksi per tanggal, tiap kelompok diberi total kumulatif (sampai dengan tanggal itu)
  function txGroupedWithRunningTotal(tx) {
    if (!tx.length) return `<div class="erp-empty">Belum ada transaksi.</div>`;
    const asc = [...tx].sort((a, b) => a.ts - b.ts);
    const groups = [];
    let cum = 0;
    let curDate = null, curGroup = null;
    for (const t of asc) {
      cum += t.jenis === "in" ? t.jumlah : -t.jumlah;
      if (t.tanggal !== curDate) {
        curDate = t.tanggal;
        curGroup = { tanggal: curDate, items: [] };
        groups.push(curGroup);
      }
      curGroup.items.push(t);
      curGroup.cumAfter = cum;
    }
    return [...groups].reverse().map(g => `
      <div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--line)">

          <span style="font-size:12.5px;color:var(--ink-soft)">Total transaksi s.d hari ini: <b style="color:${g.cumAfter < 0 ? 'var(--danger)' : 'var(--ink)'}">${fmt(g.cumAfter)}</b></span>
        </div>
        ${recentTxHtml([...g.items].sort((a, b) => b.ts - a.ts), null)}
      </div>`).join("");
  }

  function downloadExcel() {
    const wb = XLSX.utils.book_new();
    for (const key of ["kebun", "dapur"]) {
      const d = state[key];
      const sorted = [...d.tx].sort((a, b) => a.ts - b.ts);
      let running = d.saldo - sorted.reduce((s, t) => s + (t.jenis === 'in' ? t.jumlah : -t.jumlah), 0);
      const rows = [["Tanggal", "Kategori", "Keterangan", "Penerima", "Debit", "Kredit", "Saldo"]];
      rows.push(["", "", "SALDO AWAL", "", "", "", running]);
      for (const t of sorted) {
        running += t.jenis === "in" ? t.jumlah : -t.jumlah;
        rows.push([
          t.tanggal, t.kode, t.ket, t.penerima || "",
          t.jenis === "in" ? t.jumlah : "",
          t.jenis === "out" ? t.jumlah : "",
          running
        ]);
      }
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"] = [{ wch: 10 }, { wch: 26 }, { wch: 34 }, { wch: 16 }, { wch: 12 }, { wch: 12 }, { wch: 14 }];
      XLSX.utils.book_append_sheet(wb, ws, NAMES[key]);
    }
    XLSX.writeFile(wb, `Kas-Kecil-${new Date().toISOString().slice(0, 10)}.xlsx`);
  }

  function categorizeDapur(ket) {
    if (/KAS MASUK/i.test(ket)) return "Kas masuk (top up)";
    return "6200.12.36 - BIAYA KONSUMSI KANTOR";
  }

  // Deteksi kolom secara dinamis dari posisi sel "SALDO AWAL" (tahan terhadap pergeseran kolom antar versi file)
  function parseSheetBlocks(aoa) {
    const blocks = [];
    let i = 0;
    while (i < aoa.length) {
      const row = aoa[i] || [];
      let ketCol = -1;
      for (let c = 0; c < row.length; c++) {
        if (typeof row[c] === "string" && row[c].trim().toUpperCase() === "SALDO AWAL") { ketCol = c; break; }
      }
      if (ketCol >= 0) {
        const dateCol = ketCol - 2, accCol = ketCol - 1, penCol = ketCol + 1, debitCol = ketCol + 2, kreditCol = ketCol + 3, saldoCol = ketCol + 4;
        const rows = [];
        i++;
        while (i < aoa.length) {
          const r = aoa[i] || [];
          const empty = r.every(c => c === undefined || c === null || c === "");
          if (empty) break;
          const ketText = (r[ketCol] == null ? "" : String(r[ketCol])).trim();
          if (ketText.toUpperCase() === "SALDO AWAL") break;
          const debit = Number(r[debitCol]) || 0;
          const kredit = Number(r[kreditCol]) || 0;
          if (ketText && (debit > 0 || kredit > 0)) {
            rows.push({
              dateCell: r[dateCol], acc: r[accCol], ketText,
              penerima: (r[penCol] == null ? "" : String(r[penCol])).trim(),
              debit, kredit, saldo: Number(r[saldoCol]) || 0
            });
          }
          i++;
        }
        blocks.push({ rows });
      } else {
        i++;
      }
    }
    return blocks;
  }

  // Konversi serial tanggal Excel -> timestamp UTC, TANPA bergantung timezone perangkat/browser.
  // (Sebelumnya memakai Date object dari SheetJS cellDates yang ternyata bisa berbeda hasil antar perangkat.)
  function excelSerialToUTCTs(serial) {
    const utcDays = Math.floor(serial - 25569); // 25569 = jarak hari epoch Excel (1899-12-30) ke epoch Unix (1970-01-01)
    return utcDays * 86400 * 1000;
  }

  function toTx(kas, blocks) {
    const out = [];
    let seq = 0;
    for (const block of blocks) {
      for (const r of block.rows) {
        const serial = typeof r.dateCell === "number" ? r.dateCell : null;
        const baseTs = serial != null ? excelSerialToUTCTs(serial) : Date.now();
        const ts = baseTs + seq++;
        const tanggal = serial != null
          ? new Date(baseTs).toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric", timeZone: "UTC" })
          : "";
        const jenis = r.debit > 0 ? "in" : "out";
        const jumlah = r.debit > 0 ? r.debit : r.kredit;
        const kode = kas === "kebun" ? coaName(r.acc) : categorizeDapur(r.ketText);
        out.push({ ts, tanggal, jenis, jumlah, kode, ket: r.ketText, penerima: r.penerima, saldoFromFile: r.saldo });
      }
    }
    return out;
  }

  // ===== REKONSILIASI PENGIRIMAN vs PEMBAYARAN =====

  function parseShipmentWorkbook(wb) {
    const shipments = [];
    for (const sheetName of wb.SheetNames) {
      const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, raw: true, defval: null });
      let headerRow = -1, colTgl = -1, colPlat = -1, colPabrik = -1, colSupir = -1;
      for (let r = 0; r < Math.min(aoa.length, 10); r++) {
        const row = aoa[r] || [];
        const idxTgl = row.findIndex(c => typeof c === "string" && c.trim().toUpperCase() === "TANGGAL");
        const idxPlat = row.findIndex(c => typeof c === "string" && c.trim().toUpperCase().includes("PLAT"));
        if (idxTgl >= 0 && idxPlat >= 0) {
          headerRow = r; colTgl = idxTgl; colPlat = idxPlat;
          colPabrik = row.findIndex(c => typeof c === "string" && c.trim().toUpperCase() === "PABRIK");
          colSupir = row.findIndex(c => typeof c === "string" && c.trim().toUpperCase().includes("SUPIR"));
          break;
        }
      }
      if (headerRow < 0) continue;
      for (let r = headerRow + 1; r < aoa.length; r++) {
        const row = aoa[r];
        if (!row) continue;
        const serial = row[colTgl];
        const plat = row[colPlat];
        if (typeof serial !== "number" || !plat) continue;
        shipments.push({
          ts: excelSerialToUTCTs(serial),
          plat: String(plat).trim(),
          pabrik: colPabrik >= 0 ? String(row[colPabrik] || "").trim() : "",
          supir: colSupir >= 0 ? String(row[colSupir] || "").trim() : ""
        });
      }
    }
    return shipments;
  }

  function extractPlatFromKet(ket) {
    const m = ket.match(/\bB\s?\d{3,4}\s?[A-Z]{2,3}\b/);
    return m ? m[0].replace(/\s+/g, " ").trim() : null;
  }
  const BULAN_MAP = { JANUARI: 0, FEBRUARI: 1, MARET: 2, APRIL: 3, MEI: 4, JUNI: 5, JULI: 6, AGUSTUS: 7, SEPTEMBER: 8, OKTOBER: 9, NOVEMBER: 10, DESEMBER: 11 };
  function extractTglOverrideFromKet(ket) {
    const m = ket.match(/TGL\s+(\d{1,2})\s+(JANUARI|FEBRUARI|MARET|APRIL|MEI|JUNI|JULI|AGUSTUS|SEPTEMBER|OKTOBER|NOVEMBER|DESEMBER)\s+(\d{4})/i);
    if (!m) return null;
    return Date.UTC(Number(m[3]), BULAN_MAP[m[2].toUpperCase()], Number(m[1]));
  }
  function dateKeyUTC(ts) {
    const d = new Date(ts);
    return d.getUTCFullYear() + "-" + String(d.getUTCMonth() + 1).padStart(2, "0") + "-" + String(d.getUTCDate()).padStart(2, "0");
  }

  // Hitung rekonsiliasi: bandingkan data pengiriman vs pembayaran uang makan & grading di Kas Kebun
  function computeReconciliation() {
    const shipments = state.shipments || [];
    if (!shipments.length) return null;

    // Kelompokkan pengiriman per (tanggal|plat)
    const shipByKey = {};
    for (const s of shipments) {
      const key = dateKeyUTC(s.ts) + "|" + s.plat;
      if (!shipByKey[key]) shipByKey[key] = { pabrik: new Set(), count: 0, ts: s.ts, plat: s.plat, supir: new Set() };
      shipByKey[key].pabrik.add(s.pabrik);
      if (s.supir) shipByKey[key].supir.add(s.supir);
      shipByKey[key].count++;
    }

    // Pembayaran uang makan (VRA) & grading dari Kas Kebun — simpan detail transaksinya, bukan cuma jumlah
    const makanByKey = {}, gradingByKey = {};
    for (const t of state.kebun.tx) {
      if (t.jenis !== "out") continue;
      const plat = extractPlatFromKet(t.ket);
      if (!plat) continue;
      const override = extractTglOverrideFromKet(t.ket);
      const effTs = override != null ? override : t.ts;
      const key = dateKeyUTC(effTs) + "|" + plat;
      if (t.kode.includes("VRA") && /UANG MAKAN/i.test(t.ket)) { (makanByKey[key] = makanByKey[key] || []).push(t); }
      if (t.kode.includes("GRADING") && /GRADING/i.test(t.ket)) { (gradingByKey[key] = gradingByKey[key] || []).push(t); }
    }

    // Pola per PABRIK (dari kombinasi non-ambigu / 1 pabrik per truk-hari)
    function buildPabrikStat(payMap) {
      const stat = {};
      for (const key in shipByKey) {
        const s = shipByKey[key];
        if (s.pabrik.size !== 1) continue;
        const p = [...s.pabrik][0];
        if (!stat[p]) stat[p] = { shipment: 0, dibayar: 0 };
        stat[p].shipment++;
        if ((payMap[key] || []).length > 0) stat[p].dibayar++;
      }
      return stat;
    }
    const statMakan = buildPabrikStat(makanByKey);
    const statGrading = buildPabrikStat(gradingByKey);

    // Bangun baris hasil per truk-hari
    const rows = [];
    for (const key in shipByKey) {
      const s = shipByKey[key];
      const ambigu = s.pabrik.size > 1;
      const pabrik = ambigu ? [...s.pabrik].join(" / ") : [...s.pabrik][0];
      const makanTx = makanByKey[key] || [];
      const gradingTx = gradingByKey[key] || [];
      const bayarMakan = makanTx.length;
      const bayarGrading = gradingTx.length;
      let statusMakan = "netral", statusGrading = "netral";
      if (!ambigu) {
        const rateMakan = statMakan[pabrik] ? statMakan[pabrik].dibayar / statMakan[pabrik].shipment : 0;
        const rateGrading = statGrading[pabrik] ? statGrading[pabrik].dibayar / statGrading[pabrik].shipment : 0;
        const biasaDibayarMakan = rateMakan >= 0.5;
        const biasaDibayarGrading = rateGrading >= 0.5;
        if (bayarMakan > s.count) statusMakan = "lebih";
        else if (biasaDibayarMakan && bayarMakan < s.count) statusMakan = "kurang";
        else if (!biasaDibayarMakan && bayarMakan > 0) statusMakan = "cek";
        else statusMakan = "ok";
        if (bayarGrading > s.count) statusGrading = "lebih";
        else if (biasaDibayarGrading && bayarGrading < s.count) statusGrading = "kurang";
        else if (!biasaDibayarGrading && bayarGrading > 0) statusGrading = "cek";
        else statusGrading = "ok";
      }
      rows.push({
        ts: s.ts, plat: s.plat, pabrik, supir: [...s.supir].join(", "), kirim: s.count,
        bayarMakan, statusMakan, makanTx,
        bayarGrading, statusGrading, gradingTx,
        ambigu
      });
    }
    rows.sort((a, b) => b.ts - a.ts);
    return { rows, statMakan, statGrading };
  }

  async function handleImportShipmentFile(file) {
    try {
      if (typeof XLSX === "undefined") {
        alert("Gagal memuat komponen pembaca Excel. Coba muat ulang halaman dengan koneksi internet aktif.");
        return;
      }
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const shipments = parseShipmentWorkbook(wb);
      if (!shipments.length) {
        alert("Tidak ada data pengiriman terbaca. Pastikan file punya kolom 'TANGGAL' dan 'PLAT KENDARAAN'.");
        return;
      }
      state.shipments = shipments;
      saveState();
      ui.toast = `Data pengiriman berhasil diimpor: ${shipments.length} baris`;
      render();
      setTimeout(() => { ui.toast = ""; render(); }, 2000);
    } catch (err) {
      console.error("Gagal impor data pengiriman:", err);
      alert("Gagal membaca file ini: " + err.message);
    }
  }

  async function handleImportFile(file) {

      <div class="erp-card">${topExpensesHtml(flow.tx, 5)}</div>

      <div class="erp-section-title">Ringkasan per Akun</div>
      <div class="erp-card">${accountBreakdownHtml(flow.tx, 8)}</div>

      <div class="erp-section-title">Transaksi Terbaru</div>
      <div class="erp-card">${recentTxHtml(flow.tx, 8)}</div>`;
  }

  function pageTransaksi(flow) {
    return `
      <div class="erp-section-title">Laporan Transaksi</div>
      <div class="erp-card">${txGroupedWithRunningTotal(flow.tx)}</div>`;
  }

  function pageRekap(flow) {
    return `
      <div class="erp-section-title">Rekap per Akun</div>
      <div class="erp-card">${accountBreakdownHtml(flow.tx, null)}</div>`;
  }

  function pageLaporan(flow) {
    return `
      <div class="erp-section-title">Laporan Kas</div>
      <div class="erp-grid-4">
        <div class="erp-stat-card"><div class="icon-wrap">⬇️</div><div><div class="label">Kas Masuk</div><div class="value">${fmt(flow.masuk)}</div></div></div>
        <div class="erp-stat-card"><div class="icon-wrap">⬆️</div><div><div class="label">Kas Keluar</div><div class="value">${fmt(flow.keluar)}</div></div></div>
        <div class="erp-stat-card"><div class="icon-wrap">🏁</div><div><div class="label">Saldo Awal</div><div class="value">${fmt(flow.awal)}</div></div></div>
        <div class="erp-stat-card"><div class="icon-wrap">🏆</div><div><div class="label">Saldo Akhir</div><div class="value">${fmt(flow.akhir)}</div></div></div>
      </div>
      <div class="erp-section-title">Rekap per Akun</div>
      <div class="erp-card">${accountBreakdownHtml(flow.tx, null)}</div>`;
  }

  function statusBadge(status) {
    const map = {
      ok: ["Sesuai", "var(--success-bg)", "var(--success)"],
      lebih: ["Kelebihan bayar", "var(--danger-bg)", "var(--danger)"],
      kurang: ["Belum dibayar", "var(--danger-bg)", "var(--danger)"],
      cek: ["Di luar pola biasa", "#FFF4D6", "#8A6100"],
      netral: ["-", "var(--bg, #F0F1F3)", "var(--ink-faint)"]
    };
    const [label, bg, color] = map[status] || map.netral;
    return `<span style="background:${bg};color:${color};font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap">${label}</span>`;
  }

  function pageRekonsiliasi() {
    const recon = computeReconciliation();
    if (!recon) {
      return `
        <div class="erp-section-title">Rekonsiliasi Pengiriman vs Pembayaran</div>
        <div class="erp-card" style="text-align:center;padding:40px 20px">
          <div style="font-size:14px;color:var(--ink-soft);margin-bottom:16px">Belum ada data pengiriman diimpor.</div>
          <button class="erp-btn-outline" id="btn-import-shipment-inline" style="margin:0 auto">Impor Data Pengiriman</button>
        </div>`;
    }
    const { rows, statMakan, statGrading } = recon;
    const issues = rows.filter(r => !r.ambigu && (r.statusMakan === "lebih" || r.statusMakan === "kurang" || r.statusGrading === "lebih" || r.statusGrading === "kurang"));
    const perlucek = rows.filter(r => r.ambigu);

    const statRows = Object.keys(statMakan).map(p => {
      const m = statMakan[p], g = statGrading[p] || { shipment: m.shipment, dibayar: 0 };
      return `<tr>
        <td class="acc-name">${p}</td>
        <td class="num">${m.shipment}</td>
        <td class="num">${(m.dibayar / m.shipment * 100).toFixed(0)}%</td>
        <td class="num">${(g.dibayar / g.shipment * 100).toFixed(0)}%</td>
      </tr>`;
    }).join("");

    const rowsHtml = rows.slice(0, 100).map((r, i) => {
      const rkey = "recon" + i;
      const isIssue = !r.ambigu && (r.statusMakan === "lebih" || r.statusMakan === "kurang" || r.statusGrading === "lebih" || r.statusGrading === "kurang");
      const open = ui.reconOpen[rkey] !== undefined ? ui.reconOpen[rkey] : isIssue;
      const detailMakan = r.makanTx.length
        ? r.makanTx.map(t => `<div style="padding:6px 0;border-top:1px solid var(--line);font-size:12.5px">${t.tanggal} — ${t.ket} <b>(${fmt(t.jumlah)})</b></div>`).join("")
        : `<div style="padding:6px 0;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-faint)">Tidak ada pembayaran uang makan ditemukan untuk truk & tanggal ini.</div>`;
      const detailGrading = r.gradingTx.length
        ? r.gradingTx.map(t => `<div style="padding:6px 0;border-top:1px solid var(--line);font-size:12.5px">${t.tanggal} — ${t.ket} <b>(${fmt(t.jumlah)})</b></div>`).join("")
        : `<div style="padding:6px 0;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-faint)">Tidak ada pembayaran grading ditemukan untuk truk & tanggal ini.</div>`;
      return `
      <div style="border-bottom:1px solid var(--line)">
        <button data-reconkey="${rkey}" style="width:100%;background:none;border:none;text-align:left;padding:12px 0;display:flex;justify-content:space-between;align-items:center;gap:12px">
          <div style="display:flex;align-items:center;gap:12px;min-width:0">
            <span class="erp-tx-date">${new Date(r.ts).toLocaleDateString("id-ID", { day: "2-digit", month: "short", timeZone: "UTC" })}</span>
            <div style="min-width:0">
              <div class="erp-tx-ket">${r.plat}${r.supir ? " • " + r.supir : ""} ${r.ambigu ? "⚠️ ke 2 pabrik hari ini" : "→ " + r.pabrik}</div>
              <div class="erp-tx-meta">Kirim ${r.kirim}x • Uang makan dibayar ${r.bayarMakan}x • Grading dibayar ${r.bayarGrading}x</div>
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
            ${r.ambigu ? `<span style="background:#FFF4D6;color:#8A6100;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px">Cek manual</span>` : statusBadge(r.statusMakan) + statusBadge(r.statusGrading)}
            <span style="color:var(--ink-faint);font-size:12px;transition:transform 0.15s;${open ? "" : "transform:rotate(-90deg)"}">▾</span>
          </div>
        </button>
        ${open ? `
        <div style="background:#FAFAFB;border-radius:10px;padding:12px 14px;margin-bottom:12px">
          <div style="font-size:11.5px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:2px">📋 Data pengiriman (sumber: file rekap kirim)</div>
          <div style="font-size:12.5px;padding:6px 0">Tanggal ${new Date(r.ts).toLocaleDateString("id-ID", { day: "2-digit", month: "long", year: "numeric", timeZone: "UTC" })} — truk <b>${r.plat}</b>${r.supir ? " (supir: " + r.supir + ")" : ""} kirim <b>${r.kirim}x</b> ke <b>${r.pabrik}</b></div>
          <div style="font-size:11.5px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.03em;margin:10px 0 2px">🍽️ Pembayaran UANG MAKAN di Kas Kebun (${r.bayarMakan}x)</div>
          ${detailMakan}
          <div style="font-size:11.5px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.03em;margin:10px 0 2px">📦 Pembayaran UANG GRADING di Kas Kebun (${r.bayarGrading}x)</div>
          ${detailGrading}
        </div>` : ""}
      </div>`;
    }).join("");

    return `
      <div class="erp-section-title">Rekonsiliasi Pengiriman vs Pembayaran</div>
      <div class="erp-grid-4" style="margin-bottom:20px">
        <div class="erp-stat-card"><div class="icon-wrap">🚚</div><div><div class="label">Total truk-hari</div><div class="value">${rows.length}</div></div></div>
        <div class="erp-stat-card"><div class="icon-wrap">⚠️</div><div><div class="label">Perlu ditinjau</div><div class="value">${issues.length}</div></div></div>
        <div class="erp-stat-card"><div class="icon-wrap">❓</div><div><div class="label">Ambigu (2 pabrik)</div><div class="value">${perlucek.length}</div></div></div>
        <div class="erp-stat-card"><div class="icon-wrap">📄</div><div><div class="label">Data pengiriman</div><div class="value">${state.shipments.length} baris</div></div></div>
      </div>

      <div class="erp-section-title">Pola pembayaran per pabrik (dari histori)</div>
      <div class="erp-card" style="margin-bottom:20px">
        <table class="erp-table">
          <thead><tr><th>Pabrik</th><th class="num">Jumlah kirim</th><th class="num">% dapat uang makan</th><th class="num">% dapat grading</th></tr></thead>
          <tbody>${statRows}</tbody>
        </table>
      </div>

      <div class="erp-section-title">Detail per truk-hari (terbaru dulu)</div>
      <div class="erp-card">${rowsHtml}</div>`;
  }

  function render() {
    const flow = scopedFlow();
    let pageContent = "";
    if (ui.page === "transaksi") pageContent = pageTransaksi(flow);
    else if (ui.page === "rekap") pageContent = pageRekap(flow);
    else if (ui.page === "laporan") pageContent = pageLaporan(flow);
    else if (ui.page === "rekonsiliasi") pageContent = pageRekonsiliasi();
    else pageContent = pageDashboard(flow);

    root.innerHTML = `
      <div class="erp-shell">
        ${sidebarHtml()}
        <div class="erp-main">
          ${headerHtml(flow.periods, flow.effPeriod)}
          ${pageContent}
        </div>
      </div>
      ${importModalHtml()}
      ${ui.toast ? `<div class="erp-toast">${ui.toast}</div>` : ""}
    `;
    bind();
  }

  function bind() {
    const q = (id) => document.getElementById(id);

    // Sidebar navigation
    document.querySelectorAll("[data-page]").forEach(b => b.onclick = () => {
      ui.page = b.dataset.page;
      ui.sidebarOpen = false;
      render();
    });
    if (q("btn-menu")) q("btn-menu").onclick = () => { ui.sidebarOpen = true; render(); };
    if (q("sidebar-backdrop")) q("sidebar-backdrop").onclick = () => { ui.sidebarOpen = false; render(); };

    // Header filters
    if (q("f-filter-period")) q("f-filter-period").onchange = (e) => { ui.filterPeriod = e.target.value; render(); };
    if (q("f-filter-kas")) q("f-filter-kas").onchange = (e) => { ui.filterKas = e.target.value; ui.filterPeriod = "auto"; render(); };
    if (q("btn-refresh")) q("btn-refresh").onclick = () => autoFetchFromGithub(false);

    // Export & Import
    if (q("nav-export")) q("nav-export").onclick = downloadExcel;
    if (q("nav-import")) q("nav-import").onclick = () => q("f-import").click();
    if (q("f-import")) q("f-import").onchange = (e) => {
      const file = e.target.files[0];
      if (file) handleImportFile(file);
    };
    if (q("nav-import-shipment")) q("nav-import-shipment").onclick = () => q("f-import-shipment").click();
    document.querySelectorAll("[data-reconkey]").forEach(b => b.onclick = () => {
      const k = b.dataset.reconkey;
      const chev = b.querySelector("span[style*='transition']");
      const currentlyOpen = chev ? !chev.style.transform.includes("rotate") : false;
      ui.reconOpen[k] = !currentlyOpen;
      render();
    });
    if (q("btn-import-shipment-inline")) q("btn-import-shipment-inline").onclick = () => q("f-import-shipment").click();
    if (q("f-import-shipment")) q("f-import-shipment").onchange = (e) => {
      const file = e.target.files[0];
      if (file) handleImportShipmentFile(file);
    };
    if (q("kk-import-cancel")) q("kk-import-cancel").onclick = () => { ui.importPreview = null; render(); };
    if (q("kk-import-overlay")) q("kk-import-overlay").addEventListener("click", (e) => { if (e.target.id === "kk-import-overlay") { ui.importPreview = null; render(); } });
    if (q("kk-import-confirm")) q("kk-import-confirm").onclick = () => {
      const p = ui.importPreview;
      const replace = q("f-replace").checked;
      for (const kas of ["kebun", "dapur"]) {
        if (p[kas].length === 0) continue;
        state[kas].tx = replace ? p[kas] : state[kas].tx.concat(p[kas]);
        const saldoKey = kas === "kebun" ? "saldoKebun" : "saldoDapur";
        if (p[saldoKey] !== null) state[kas].saldo = p[saldoKey];
      }
      ui.importPreview = null;
      saveState();
      ui.toast = "Data berhasil diimpor";
      render();
      setTimeout(() => { ui.toast = ""; render(); }, 1800);
    };
  }


  loadState();
})();
</script>
